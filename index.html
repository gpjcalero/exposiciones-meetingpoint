<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Porcelanosa · Auditoría Showrooms</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <style>
    :root {
      --bg: #F2F4F7;
      --card: #FFFFFF;
      --border: #E5E7EB;
      --border2: #D1D5DB;
      --text: #111827;
      --text2: #374151;
      --text3: #6B7280;
      --text4: #9CA3AF;
      --white: #FFFFFF;
      --green: #10B981;
      --yellow: #F59E0B;
      --red: #EF4444;
      --blue: #4F46E5;
      --blue-bg: #EEF2FF;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .shell {
      max-width: 440px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      background: var(--bg);
    }

    /* Animations */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%)
      }

      to {
        transform: translateY(0)
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: .3
      }

      50% {
        opacity: 1
      }
    }

    .anim-up {
      animation: fadeUp .35s ease both;
    }

    .anim-in {
      animation: fadeIn .3s ease both;
    }

    /* Top bar */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 40;
      padding: 14px 16px;
      background: rgba(255, 255, 255, .94);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .topbar h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .topbar .sub {
      font-size: 11px;
      color: var(--text3);
      margin-top: 1px;
    }

    .back-btn {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text2);
      cursor: pointer;
      padding: 8px;
      display: flex;
      box-shadow: 0 1px 2px rgba(0, 0, 0, .05);
    }

    .back-btn svg {
      width: 18px;
      height: 18px;
    }

    /* Cards */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color .15s, transform .1s, box-shadow .15s;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .02);
    }

    .card:active {
      transform: scale(.98);
      border-color: var(--blue);
    }

    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-sub {
      font-size: 11px;
      color: var(--text3);
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Avatars & icons */
    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: var(--blue-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 18px;
      color: var(--blue);
      flex-shrink: 0;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 14px;
    }

    .ico-box {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--text3);
    }

    .ico-box.green {
      background: rgba(16, 185, 129, .1);
      border-color: rgba(16, 185, 129, .2);
      color: var(--green);
    }

    .ico-box.yellow {
      background: rgba(245, 158, 11, .1);
      border-color: rgba(245, 158, 11, .2);
      color: var(--yellow);
    }

    .ico-box.blue {
      background: var(--blue-bg);
      border-color: rgba(79, 70, 229, .2);
      color: var(--blue);
    }

    /* Badges */
    .pill {
      padding: 4px 10px;
      border-radius: 8px;
      background: var(--bg);
      font-size: 11px;
      font-weight: 700;
      color: var(--text3);
      white-space: nowrap;
    }

    .status-pill {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 700;
      margin-top: 6px;
    }

    .status-ACTIVO {
      background: rgba(16, 185, 129, .1);
      color: var(--green);
    }

    .status-OBSOLETO,
    .status-NO_PRODUCIBLE {
      background: rgba(239, 68, 68, .1);
      color: var(--red);
    }

    .status-NO_TARIFA {
      background: rgba(245, 158, 11, .1);
      color: var(--yellow);
    }

    /* Buttons */
    .btn-primary {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: var(--blue);
      color: var(--white);
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(79, 70, 229, .3);
    }

    .btn-primary:active {
      opacity: .85;
      transform: scale(.98);
    }

    .btn-danger {
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: #FEE2E2;
      color: #DC2626;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      flex: 1;
    }

    .btn-secondary {
      padding: 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--white);
      color: var(--text2);
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      flex: 1;
    }

    .trash-btn {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px;
      cursor: pointer;
      color: var(--red);
      display: flex;
      flex-shrink: 0;
      box-shadow: 0 1px 2px rgba(0, 0, 0, .02);
    }

    .trash-btn:active {
      background: #FEE2E2;
      border-color: #FCA5A5;
    }

    .scan-btn {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 6px 12px;
      cursor: pointer;
      color: var(--blue);
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      font-family: inherit;
    }

    .photo-btn {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 6px 12px;
      cursor: pointer;
      color: var(--text2);
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      font-family: inherit;
      margin-top: 10px;
    }

    .fab {
      position: fixed;
      bottom: 24px;
      right: calc(50% - 195px);
      z-index: 50;
      width: 56px;
      height: 56px;
      border-radius: 18px;
      background: var(--blue);
      color: var(--white);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 20px rgba(79, 70, 229, .4);
      animation: fadeUp .3s ease .2s both;
    }

    @media(max-width:440px) {
      .fab {
        right: 20px;
      }
    }

    .fab:active {
      transform: scale(.92);
    }

    /* Inputs */
    .input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #F9FAFB;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: .2s;
    }

    .input:focus {
      border-color: var(--blue);
      background: var(--white);
      box-shadow: 0 0 0 3px var(--blue-bg);
    }

    .label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--text3);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    textarea.input {
      resize: none;
    }

    /* Chips */
    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      padding: 10px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--white);
      color: var(--text3);
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: .2s;
    }

    .chip.active {
      border-color: var(--blue);
      background: var(--blue-bg);
      color: var(--blue);
    }

    .chip-status {
      flex: 1;
      padding: 12px 8px;
      text-align: center;
    }

    .chip-status.active-green {
      border-color: var(--green);
      background: rgba(16, 185, 129, .1);
      color: var(--green);
    }

    .chip-status.active-yellow {
      border-color: var(--yellow);
      background: rgba(245, 158, 11, .1);
      color: var(--yellow);
    }

    .chip-status.active-red {
      border-color: var(--red);
      background: rgba(239, 68, 68, .1);
      color: var(--red);
    }

    /* Modal */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(17, 24, 39, .4);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      animation: fadeIn .2s ease;
    }

    .sheet {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px 24px 0 0;
      padding: 24px;
      width: 100%;
      max-width: 440px;
      animation: slideUp .3s ease;
      box-shadow: 0 -4px 20px rgba(0, 0, 0, .08);
    }

    .sheet-handle {
      width: 36px;
      height: 4px;
      border-radius: 2px;
      background: var(--border2);
      margin: 0 auto 20px;
    }

    .sheet-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 20px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 300;
      padding: 12px 24px;
      border-radius: 12px;
      color: var(--white);
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      box-shadow: 0 8px 30px rgba(0, 0, 0, .15);
      animation: fadeUp .25s ease both;
    }

    .toast-ok {
      background: #10B981;
    }

    .toast-err {
      background: #EF4444;
    }

    .toast-info {
      background: #374151;
    }

    /* Empty */
    .empty {
      text-align: center;
      padding: 60px 20px;
    }

    .empty-ico {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      color: var(--text4);
      box-shadow: 0 4px 10px rgba(0, 0, 0, .02);
    }

    .empty-text {
      font-size: 15px;
      font-weight: 600;
      color: var(--text2);
    }

    /* Progress */
    .progress {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
    }

    .progress-bar {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      transition: .3s;
    }

    .progress-bar.active {
      background: var(--blue);
    }

    /* Capture zone */
    .capture-zone {
      border: 2px dashed var(--border2);
      border-radius: 20px;
      padding: 48px 20px;
      text-align: center;
      cursor: pointer;
      background: var(--white);
      transition: .2s;
    }

    .capture-zone:active {
      border-color: var(--blue);
      background: var(--blue-bg);
    }

    /* Ambient photo */
    .ambient-photo {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 12px;
      margin-top: 12px;
      display: block;
      border: 1px solid var(--border);
    }

    /* Scrollable list area */
    .list {
      padding: 16px 20px 100px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Chevron icon */
    .chevron {
      color: var(--border2);
      flex-shrink: 0;
    }

    /* Search with icon */
    .search-wrap {
      position: relative;
      margin-bottom: 12px;
    }

    .search-wrap svg {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text4);
    }

    .search-wrap .input {
      padding-left: 42px;
      border-radius: 16px;
    }

    /* Activity badge for stores list */
    .activity-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 0 2px var(--white);
    }

    .activity-dot.active {
      background: var(--green);
    }

    .activity-dot.inactive {
      background: var(--red);
    }

    .activity-dot.unknown {
      background: var(--text4);
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>
  <div class="shell" id="app"></div>

    const SKEY = "porcelanosa-v4";
    let state = { stores: [], ambientes: {}, materials: {}, photos: {}, logs: [], view: "home", selStore: null, selBox: null, modal: null };

    async function loadState() {
      try {
        const defaultData = localStorage.getItem(SKEY);
        if (defaultData) {
          const d = JSON.parse(defaultData);
          state.stores = d.stores || [];
          state.ambientes = d.ambientes || {};
          state.materials = d.materials || {};
          state.photos = d.photos || {};
          state.logs = d.logs || [];
        }
      } catch (e) {
        console.error("Local load error:", e);
      }

      try {
        const [storesRes, boxesRes, materialsRes, logsRes] = await Promise.all([
          fetch('/api/stores').catch(() => null),
          fetch('/api/boxes').catch(() => null),
          fetch('/api/materials').catch(() => null),
          fetch('/api/logs').catch(() => null)
        ]);

        if (storesRes && storesRes.ok) {
          const stores = await storesRes.json();
          if (stores.length) {
            state.stores = stores.map(s => ({
              id: s.id, pais: s.pais || '', codSap: s.cod_sap, cliente: s.cliente, tienda: s.tienda,
              codigoCliente: s.codigo_cliente, clienteDef: s.cliente_def, actividad: s.actividad
            }));
          }
        }
        if (boxesRes && boxesRes.ok) {
          const boxes = await boxesRes.json();
          state.ambientes = {};
          for (const b of boxes) {
            if (!state.ambientes[b.store_id]) state.ambientes[b.store_id] = [];
            state.ambientes[b.store_id].push({ id: b.id, name: b.name });
          }
        }
        if (materialsRes && materialsRes.ok) {
          const materials = await materialsRes.json();
          state.materials = {};
          for (const m of materials) {
            if (!state.materials[m.store_id]) state.materials[m.store_id] = {};
            if (!state.materials[m.store_id][m.box_id]) state.materials[m.store_id][m.box_id] = [];
            state.materials[m.store_id][m.box_id].push({
              sapCode: m.sap_code, location: m.location, date: m.date, status: m.status, notes: m.notes
            });
          }
        }
        if (logsRes && logsRes.ok) {
          const logs = await logsRes.json();
          state.logs = logs.map(l => ({
            storeId: l.store_id, boxId: l.box_id, sapCode: l.sap_code, location: l.location, ts: l.ts
          }));
        }

        // Attempt photos fetch for the active environment directly rather than all, or ignore if too large.
        // We already load photos from localStorage, which acts as a cache.

      } catch (e) {
        console.error('API load error.', e);
      }

      if (state.stores.length === 0) {
        state.stores = MASTER_STORES.map((s, i) => ({ id: 'st_' + i, ...s }));
      }
    }

    function saveState() {
      try {
        localStorage.setItem(SKEY, JSON.stringify({
          stores: state.stores, ambientes: state.ambientes, materials: state.materials, photos: state.photos, logs: state.logs
        }));
      } catch (e) {
        console.warn("Storage quota exceeded", e);
      }
    }

        s.cliente.toLowerCase().includes(q) || s.tienda.toLowerCase().includes(q) || (s.pais||'').toLowerCase().includes(q) || s.codSap.includes(q)

      return stores;

    function delStore(id) {
      showConfirm('Eliminar tienda', state.stores.find(s => s.id === id)?.tienda || '', () => {

        saveState(); renderStores(); toast('Tienda eliminada', 'info');

      const store = state.stores.find(s => s.id === id);
      if (!store) return;
      const overlay = document.createElement('div');

      overlay.innerHTML = `<div class="sheet">

      </div>`;
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
      document.body.appendChild(overlay);

        const pais = $('editPaisInput').value.trim();
        store.pais = pais;

        renderStores();

    function showAddStore() {
      showModal('Nueva Tienda', [
        { label: 'País', ph: 'Ej: Francia, Italia, Brasil' },
        { label: 'Cliente', ph: 'Nombre del cliente' },
        { label: 'Tienda', ph: 'Nombre/ciudad' },
        { label: 'Cod. SAP', ph: 'Código SAP' },

          id,
          pais: vals[0],
          codSap: vals[3],
          cliente: vals[1],
          tienda: vals[2],
          codigoCliente: vals[3],
          clienteDef: vals[1],

            headers: { 'Content-Type': 'application/json' },

              cod_sap: vals[3],

              cliente_def: vals[1],
              actividad: 'Activo'
            })
          });

          if (!res.ok) throw new Error('No se pudo guardar la tienda en D1');
        } catch (err) {
          console.error(err);
          toast('Guardado local, pero falló D1', 'err');
        }
      });
    }

    function getPhotoSrc(p) { return typeof p === 'string' ? p : p.data; }
    function getPhotoDbId(p) { return (typeof p === 'object' && p) ? p.dbId : null; }

    /* ── BOXES (Ambientes) ────────────────────────────────────────── */
    async function renderBoxes() {
      const store = state.stores.find(s => s.id === state.selStore);
      if (!store) { go('stores'); return; }

      // Sync photos from DB (authoritative source for cross-device)
      try {
        const res = await fetch(`/api/photos?store_id=${store.id}`).catch(() => null);
        if (res?.ok) {
          const dbPhotos = await res.json();
          state.photos[store.id] = {};
          for (const p of dbPhotos) {
            if (!state.photos[store.id][p.box_id]) state.photos[store.id][p.box_id] = [];
            state.photos[store.id][p.box_id].push({ dbId: p.id, data: p.photo_data });
          }
        }
      } catch (e) { /* offline, use localStorage cache */ }

      const boxes = state.ambientes[store.id] || [];

      const html = boxes.length === 0
        ? `<div class="empty"><div class="empty-ico">${ICO.box}</div><p class="empty-text">Sin ambientes</p><p style="font-size:11px;color:var(--text4);margin-top:4px">Pulsa + para añadir BOX</p></div>`
        : boxes.map((b, i) => {
          const mats = (state.materials[store.id] || {})[b.id] || [];
          const hasMats = mats.length > 0;
          const rawPhotos = (state.photos[store.id] || {})[b.id];
          const photos = Array.isArray(rawPhotos) ? rawPhotos : (rawPhotos ? [rawPhotos] : []);
          return `<div class="card anim-up" style="animation-delay:${i * 30}ms;flex-direction:column;align-items:stretch;padding:0;overflow:hidden" onclick="go('materials',{selBox:'${b.id}'})">
          ${photos.length > 0 ? `
            <div style="display:flex;gap:8px;overflow-x:auto;padding:12px 12px 0;scrollbar-width:none;-webkit-overflow-scrolling:touch">
              ${photos.map((p, pi) => `
                <div style="position:relative;flex-shrink:0">
                  <img src="${getPhotoSrc(p)}" style="width:130px;height:95px;object-fit:cover;border-radius:10px;border:1px solid var(--border);display:block">
                  <button onclick="event.stopPropagation();delAmbientPhoto('${store.id}','${b.id}',${pi},'${getPhotoDbId(p) || ''}')"
                    style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,.55);border:none;border-radius:50%;width:20px;height:20px;color:#fff;font-size:14px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center">×</button>
                </div>`).join('')}
            </div>` : ''}
          <div style="display:flex;align-items:center;gap:12px;padding:14px 14px 0">
            <div class="ico-box ${hasMats ? 'green' : 'yellow'}">${hasMats ? ICO.check : ICO.box}</div>
            <div style="flex:1;min-width:0">
              <div class="card-title">${b.name}</div>
              <div class="card-sub">${hasMats ? `<span style="color:var(--green);font-weight:700">${mats.length} mat.</span>` : `<span style="color:var(--yellow)">Sin materiales</span>`}${photos.length > 0 ? `<span style="color:var(--text4);margin-left:6px">${ICO.camera} ${photos.length} foto${photos.length > 1 ? 's' : ''}</span>` : ''}</div>
            </div>
            <span class="chevron">${ICO.chevR}</span>
          </div>
          <div style="display:flex;gap:8px;padding:10px 14px 14px">
            <button class="scan-btn" style="flex:1;justify-content:center" onclick="event.stopPropagation();go('audit',{selBox:'${b.id}'})">${ICO.scan} Escanear</button>
            <button class="photo-btn" style="flex:1;justify-content:center;margin-top:0" onclick="event.stopPropagation();document.getElementById('ambPhoto_${b.id}').click()">${ICO.camera} Añadir foto</button>
            <button class="trash-btn" onclick="event.stopPropagation();delBox('${b.id}')">${ICO.trash}</button>
          </div>
          <input type="file" id="ambPhoto_${b.id}" accept="image/*" style="display:none" onchange="handleAmbientPhoto(this,'${store.id}','${b.id}')">
        </div>`;
        }).join('');

      app().innerHTML = `<div class="anim-in">
    <div class="topbar">
      <button class="back-btn" onclick="go('stores')">${ICO.chevL}</button>
      <div style="flex:1;min-width:0"><h1>${store.tienda}</h1><p class="sub">${store.cliente} · ${boxes.length} ambientes</p></div>
      <button onclick="doExportPDF('${store.id}')" title="Exportar PDF" style="background:var(--white);border:1px solid var(--border);border-radius:12px;padding:8px;display:flex;align-items:center;cursor:pointer;color:var(--blue);box-shadow:0 1px 2px rgba(0,0,0,.05)">${ICO.pdf}</button>
      <button onclick="downloadPhotosZip('${store.id}')" title="Descargar fotos" style="background:var(--white);border:1px solid var(--border);border-radius:12px;padding:8px;display:flex;align-items:center;cursor:pointer;color:var(--text2);box-shadow:0 1px 2px rgba(0,0,0,.05)">${ICO.camera}</button>
    </div>
    <div class="list">${html}</div>
    <button class="fab" onclick="showAddBox()">${ICO.plus}</button>
  </div>`;
    }

    function delBox(id) {
      const store = state.stores.find(s => s.id === state.selStore);
      const boxes = state.ambientes[store.id] || [];
      const box = boxes.find(b => b.id === id);
      showConfirm('Eliminar ambiente', box?.name || '', () => {
        state.ambientes[store.id] = boxes.filter(b => b.id !== id);
        if (state.materials[store.id]) delete state.materials[store.id][id];
        saveState(); renderBoxes(); toast('Ambiente eliminado', 'info');
      });
    }

    function showAddBox() {
      const store = state.stores.find(s => s.id === state.selStore);

      const overlay = document.createElement('div');
      overlay.className = 'overlay';
      overlay.innerHTML = `<div class="sheet">
        <div class="sheet-handle"></div>
        <h3 class="sheet-title">Nuevo Ambiente</h3>
        <div style="margin-bottom:12px">
          <label class="label">Nombre del ambiente</label>
          <input class="input" id="boxNameInput" placeholder="Ej: BOX 1, COULOIR, HALL" autofocus>
        </div>
        <button class="btn-secondary" id="scanLabelBtn" style="margin-bottom:12px;width:100%;justify-content:center;display:flex;align-items:center;gap:8px">
          ${ICO.camera} Fotografiar etiqueta para detectar nombre
        </button>
        <input type="file" id="labelScanInput" accept="image/*" capture="environment" style="display:none">
        <button class="btn-primary" id="boxSaveBtn">Guardar</button>
      </div>`;
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
      document.body.appendChild(overlay);

      $('scanLabelBtn').onclick = () => $('labelScanInput').click();
      $('labelScanInput').onchange = async function() {
        const file = this.files?.[0];
        if (!file) return;
        $('scanLabelBtn').textContent = 'Analizando...';
        $('scanLabelBtn').disabled = true;
        try {
          const { base64 } = await compressImage(file, 1600, 0.9);
          const res = await fetch('/api/ocr', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image_base64: base64, mime_type: 'image/jpeg', mode: 'name' })
          });
          const data = await res.json();
          if (data.name) {
            $('boxNameInput').value = data.name;
            toast('Nombre detectado: ' + data.name);
          } else {
            toast('No se detectó nombre, escríbelo manualmente', 'info');
          }
        } catch (e) {
          toast('Error al analizar la etiqueta', 'err');
        }
        $('scanLabelBtn').innerHTML = `${ICO.camera} Volver a fotografiar`;
        $('scanLabelBtn').disabled = false;
      };

      $('boxSaveBtn').onclick = async () => {
        const name = $('boxNameInput').value.trim();
        if (!name) { toast('Escribe un nombre para el ambiente', 'err'); return; }
        overlay.remove();
        const newBox = { id: 'bx_' + Date.now(), name };
        if (!state.ambientes[store.id]) state.ambientes[store.id] = [];
        state.ambientes[store.id].push(newBox);
        saveState();
        renderBoxes();
        toast('Ambiente añadido');
        try {
          const res = await fetch('/api/boxes', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: newBox.id, store_id: store.id, name: newBox.name })
          });
          if (!res.ok) throw new Error('No se pudo guardar el ambiente en D1');
        } catch (err) {
          console.error(err);
          toast('Guardado local, pero falló D1', 'err');
        }
      };
    }

    function handleAmbientPhoto(input, storeId, boxId) {
      const file = input.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const MAX = 1200;
          let w = img.width, h = img.height;
          if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          const data = canvas.toDataURL('image/jpeg', 0.82);
          const dbId = 'ph_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
          if (!state.photos[storeId]) state.photos[storeId] = {};
          const cur = state.photos[storeId][boxId];
          const newPhoto = { dbId, data };
          if (Array.isArray(cur)) {
            cur.push(newPhoto);
          } else if (cur) {
            state.photos[storeId][boxId] = [typeof cur === 'string' ? { dbId: null, data: cur } : cur, newPhoto];
          } else {
            state.photos[storeId][boxId] = [newPhoto];
          }
          saveState();
          renderBoxes();
          toast('Foto añadida');
          fetch('/api/photos', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: dbId, store_id: storeId, box_id: boxId, photo_data: data })
          }).catch(console.error);
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    }

    function delAmbientPhoto(storeId, boxId, idx, dbId) {
      const arr = state.photos[storeId]?.[boxId];
      if (!Array.isArray(arr)) return;
      arr.splice(idx, 1);
      saveState();
      renderBoxes();
      toast('Foto eliminada', 'info');
      if (dbId) {
        fetch(`/api/photos?id=${dbId}`, { method: 'DELETE' }).catch(console.error);
      }
    }

    /* ── MATERIALS LIST ───────────────────────────────────────────── */
    function renderMaterials() {
      const store = state.stores.find(s => s.id === state.selStore);
      if (!store) { go('stores'); return; }
      const boxes = state.ambientes[store.id] || [];
      const box = boxes.find(b => b.id === state.selBox);
      if (!box) { go('boxes'); return; }
      const mats = ((state.materials[store.id] || {})[box.id]) || [];

      const html = mats.length === 0
        ? `<div class="empty"><div class="empty-ico">${ICO.scan}</div><p class="empty-text">Sin materiales registrados</p><p style="font-size:11px;color:var(--text4);margin-top:4px">Escanea una etiqueta o añade manualmente</p></div>`
        : mats.map((m, i) => `
      <div class="card anim-up" style="animation-delay:${i * 25}ms;cursor:default">
        <div class="ico-box blue"><span style="font-size:10px;font-weight:800;color:var(--blue)">${m.location ? m.location.substring(0, 3) : '—'}</span></div>
        <div style="flex:1;min-width:0">
          <div class="card-title">${m.sapCode}</div>
          <div class="card-sub">${m.location || 'Sin ubicación'} · ${m.date || ''}</div>
          ${m.notes ? `<div style="font-size:10px;color:var(--text3);margin-top:2px">📝 ${m.notes}</div>` : ''}
          <span class="status-pill status-${(m.status || 'ACTIVO').replace(/ /g, '_')}">${m.status || 'ACTIVO'}</span>
        </div>
        <button class="trash-btn" onclick="delMat('${box.id}',${i})">${ICO.trash}</button>
      </div>`).join('');

      app().innerHTML = `<div class="anim-in">
    <div class="topbar">
      <button class="back-btn" onclick="go('boxes')">${ICO.chevL}</button>
      <div style="flex:1;min-width:0"><h1>${box.name}</h1><p class="sub">${store.tienda} · ${mats.length} materiales</p></div>
    </div>
    <div class="list">${html}</div>
    <div style="position:fixed;bottom:22px;right:calc(50% - 195px);z-index:50;display:flex;gap:8px">
      <button class="fab" style="position:static;width:auto;padding:0 18px;gap:6px;font-size:12px;font-weight:700" onclick="go('audit')">${ICO.scan} Escanear</button>
      <button class="fab" style="position:static" onclick="showAddMaterial()">${ICO.plus}</button>
    </div>
  </div>`;
    }

    function delMat(boxId, idx) {
      const store = state.stores.find(s => s.id === state.selStore);
      const mats = (state.materials[store.id] || {})[boxId] || [];
      if (mats[idx]) {
        mats.splice(idx, 1);
        saveState(); renderMaterials(); toast('Material eliminado', 'info');
      }
    }

    function showAddMaterial() {
      const store = state.stores.find(s => s.id === state.selStore);
      const box = (state.ambientes[store.id] || []).find(b => b.id === state.selBox);
      showModal('Añadir Material', [
        { label: 'Código SAP', ph: 'Ej: 100336896' },
        { label: 'Ubicación', ph: 'Ej: MUR, SOL, DOUCHE' },
        { label: 'Notas (opcional)', ph: 'Observaciones' },
      ], vals => {
        addMaterial(store.id, box.id, vals[0], vals[1], vals[2]);
        renderMaterials(); toast('Material añadido');
      });
    }

    async function addMaterial(storeId, boxId, sapCode, location, notes, status = 'ACTIVO') {
      if (!state.materials[storeId]) state.materials[storeId] = {};
      if (!state.materials[storeId][boxId]) state.materials[storeId][boxId] = [];

      const newMaterial = {
        sapCode,
        location: location.toUpperCase(),
        date: new Date().toLocaleDateString('es-ES'),
        status,
        notes: notes || ''
      };

      state.materials[storeId][boxId].push(newMaterial);
      const _s = state.stores.find(s => s.id === storeId);
      state.logs.push({ storeId, boxId, sapCode, location, ts: Date.now(), tienda: _s?.tienda || '', cliente: _s?.cliente || '' });
      saveState();

      try {
        const res = await fetch('/api/materials', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            store_id: storeId,
            box_id: boxId,
            sap_code: sapCode,
            location: location.toUpperCase(),
            date: newMaterial.date,
            status,
            notes: notes || ''
          })
        });

        if (!res.ok) throw new Error('No se pudo guardar el material en D1');
      } catch (err) {
        console.error(err);
        toast('Guardado local, pero falló D1', 'err');
      }
    }

    /* ── AUDIT (Camera/OCR multi-material) ───────────────────────── */
    const LOCS = ['MUR', 'SOL', 'ROBINETTERIE', 'CUISINE', 'MEUBLE', 'DOUCHE', 'WC', 'TERASSE', 'PRESENTOIR'];

    function renderAudit() {
      const store = state.stores.find(s => s.id === state.selStore);
      const box = (state.ambientes[store?.id] || []).find(b => b.id === state.selBox);
      if (!store || !box) { go('boxes'); return; }

      app().innerHTML = `<div class="anim-in">
    <div class="topbar">
      <button class="back-btn" onclick="go('materials')">${ICO.chevL}</button>
      <div style="flex:1;min-width:0"><h1>Escanear Materiales</h1><p class="sub">${box.name} · ${store.tienda}</p></div>
    </div>
    <div class="list">
      <div class="capture-zone" id="captureZone" onclick="$('fileInput').click()">
        <div style="width:64px;height:64px;border-radius:18px;background:var(--blue-bg);border:1px solid rgba(79,70,229,.2);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:var(--blue)">${ICO.camera}</div>
        <p style="font-size:15px;font-weight:700;color:var(--text)">Fotografiar etiquetas</p>
        <p style="font-size:12px;color:var(--text3);margin-top:6px">La IA detectará todos los códigos SAP de la imagen</p>
      </div>
      <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none" onchange="handleCapture(this)">
      <div id="auditItems" style="display:flex;flex-direction:column;gap:12px;"></div>
      <button class="btn-secondary" id="btnAddManual" onclick="addManualAuditItem()" style="margin-top:4px">+ Añadir código manualmente</button>
      <div id="saveAllWrapper" style="display:none;margin-top:4px">
        <button class="btn-primary" onclick="saveAllAudit()">${ICO.check} Guardar todos los materiales</button>
      </div>
    </div>
  </div>`;
      state._auditItems = [];
    }

    function addManualAuditItem(sap = '') {
      state._auditItems = state._auditItems || [];
      state._auditItems.push({ id: 'ai_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4), sap, loc: '' });
      renderAuditItems();
      const cz = $('captureZone');
      if (cz) cz.style.display = 'none';
    }

    function renderAuditItems() {
      const container = $('auditItems');
      if (!container) return;
      container.innerHTML = (state._auditItems || []).map((item, idx) => `
        <div class="card" style="flex-direction:column;align-items:stretch;padding:14px;gap:10px">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">Material #${idx + 1}</span>
            <button class="trash-btn" onclick="removeAuditItem('${item.id}')">${ICO.trash}</button>
          </div>
          <div>
            <label class="label">Código SAP</label>
            <input class="input" value="${item.sap}" placeholder="Ej: 100336896"
              oninput="updateAuditItem('${item.id}','sap',this.value)">
          </div>
          <div>
            <label class="label">Ubicación</label>
            <div class="chips" style="gap:6px;flex-wrap:wrap">
              ${LOCS.map(l => `<button class="chip ${item.loc === l ? 'active' : ''}" style="padding:6px 10px;font-size:11px"
                onclick="updateAuditItem('${item.id}','loc','${l}');renderAuditItems()">${l}</button>`).join('')}
            </div>
          </div>
        </div>
      `).join('');
      const sw = $('saveAllWrapper');
      if (sw) sw.style.display = (state._auditItems || []).length > 0 ? 'block' : 'none';
    }

    function updateAuditItem(id, field, value) {
      const item = (state._auditItems || []).find(i => i.id === id);
      if (item) item[field] = value;
    }

    function removeAuditItem(id) {
      state._auditItems = (state._auditItems || []).filter(i => i.id !== id);
      renderAuditItems();
      if (!(state._auditItems || []).length) {
        const cz = $('captureZone');
        if (cz) cz.style.display = '';
      }
    }

    function compressImage(file, maxPx, quality) {
      return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = ev => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let w = img.width, h = img.height;
            if (w > maxPx) { h = Math.round(h * maxPx / w); w = maxPx; }
            if (h > maxPx) { w = Math.round(w * maxPx / h); h = maxPx; }
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            const dataUrl = canvas.toDataURL('image/jpeg', quality);
            resolve({ base64: dataUrl.split(',')[1], dataUrl });
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    async function handleCapture(input) {
      const file = input.files?.[0];
      if (!file) return;
      toast('Analizando imagen con IA...', 'info');
      try {
        const { base64 } = await compressImage(file, 1600, 0.9);
        const res = await fetch('/api/ocr', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image_base64: base64, mime_type: 'image/jpeg' })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'OCR error ' + res.status);
        const codes = data.sap_codes || [];
        if (codes.length === 0) {
          toast('No se detectaron códigos. Añade manualmente.', 'info');
        } else {
          const cz = $('captureZone');
          if (cz) cz.style.display = 'none';
          codes.forEach(sap => addManualAuditItem(String(sap)));
          toast(`${codes.length} código${codes.length > 1 ? 's' : ''} detectado${codes.length > 1 ? 's' : ''}`);
        }
      } catch (err) {
        console.error(err);
        const msg = err?.message || String(err);
        toast('Error OCR: ' + msg.slice(0, 60), 'err');
      }
      input.value = '';
    }

    function saveAllAudit() {
      const store = state.stores.find(s => s.id === state.selStore);
      let saved = 0;
      for (const item of (state._auditItems || [])) {
        const sap = item.sap.trim();
        if (!sap) continue;
        addMaterial(store.id, state.selBox, sap, item.loc || 'SIN_UBICACION', '', 'ACTIVO');
        saved++;
      }
      if (saved > 0) {
        toast(`${saved} material${saved > 1 ? 'es' : ''} guardado${saved > 1 ? 's' : ''}`);
        go('materials');
      } else {
        toast('Añade al menos un código SAP válido', 'err');
      }
    }

    /* ── LOGS ──────────────────────────────────────────────────────── */
    function renderLogs() {
      const html = state.logs.length === 0
        ? `<div class="empty"><div class="empty-ico">${ICO.history}</div><p class="empty-text">Sin registros</p></div>`
        : [...state.logs].reverse().slice(0, 50).map((l, i) => {
          const store = state.stores.find(s => s.id === l.storeId);
          const tienda = store?.tienda || l.tienda || '—';
          const cliente = store?.cliente || l.cliente || tienda;
          return `<div class="card anim-up" style="animation-delay:${i * 25}ms;cursor:default">
          <div class="ico-box green">${ICO.check}</div>
          <div style="flex:1;min-width:0">
            <div class="card-title" style="font-size:13px">${l.sapCode}</div>
            <div class="card-sub">${cliente} · ${tienda}</div>
          </div>
        </div>`;
        }).join('');

      app().innerHTML = `<div class="anim-in">
    <div class="topbar">
      <button class="back-btn" onclick="go('home')">${ICO.chevL}</button>
      <div style="flex:1"><h1>Historial</h1><p class="sub">${state.logs.length} registros</p></div>
    </div>
    <div class="list">${html}</div>
  </div>`;
    }

    /* ── EXPORT ────────────────────────────────────────────────────── */
    function doExport() {
      const rows = [];
      let n = 1;
      for (const store of state.stores) {
        const boxes = state.ambientes[store.id] || [];
        for (const box of boxes) {
          const mats = (state.materials[store.id] || {})[box.id] || [];
          for (const m of mats) {
            rows.push({
              '#': n++, 'País': '', 'Cod.SAP': store.codSap, 'Cliente': store.cliente,
              'Tienda': store.tienda, 'Tipo': 'AUDITORIA', 'Subtipo': box.name,
              'Nombre': box.name, 'Val.': '', 'Val.COMERCIAL': '',
              'CodigoSAP': m.sapCode, 'Material': '', 'Ind.': '',
              'Coloc.': m.location, 'F.Entrada': m.date,
              'F.Revisión': new Date().toLocaleDateString('es-ES'),
              'Catálogo': '', 'Status': m.status,
              'F.Status': '', 'Novedad': '', 'Stock': '', 'D.Venta': '',
              'Notificación': m.notes, 'Sugerencia': ''
            });
          }
        }
      }
      if (!rows.length) { toast('Sin materiales para exportar', 'err'); return; }
      const ws = XLSX.utils.json_to_sheet(rows);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Auditoría');
      XLSX.writeFile(wb, `Auditoria_Porcelanosa_${new Date().toISOString().split('T')[0]}.xlsx`);
      toast('Excel exportado correctamente');
    }

    /* ── EXPORT PHOTOS ZIP ─────────────────────────────────────────── */
    async function downloadPhotosZip(storeId) {
      const zip = new JSZip();
      let count = 0;
      const targetStores = storeId
        ? state.stores.filter(s => s.id === storeId)
        : state.stores;
      for (const store of targetStores) {
        const storePhotos = state.photos[store.id] || {};
        const boxes = state.ambientes[store.id] || [];
        for (const box of boxes) {
          const raw = storePhotos[box.id];
          if (!raw) continue;
          const arr = Array.isArray(raw) ? raw : [raw];
          const safeName = `${box.name}`.replace(/[/\\?%*:|"<>]/g, '_');
          arr.forEach((photoItem, pi) => {
            const photoData = getPhotoSrc(photoItem);
            const base64 = photoData.split(',')[1];
            const ext = photoData.startsWith('data:image/png') ? 'png' : 'jpg';
            const filename = arr.length > 1 ? `${safeName} (${pi + 1}).${ext}` : `${safeName}.${ext}`;
            zip.file(filename, base64, { base64: true });
            count++;
          });
        }
      }
      if (count === 0) { toast('No hay fotos guardadas para esta tienda', 'err'); return; }
      toast('Generando ZIP...', 'info');
      const store = targetStores[0];
      const blob = await zip.generateAsync({ type: 'blob' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `Fotos_${store?.tienda || 'Ambientes'}_${new Date().toISOString().split('T')[0]}.zip`;
      a.click();
      toast(`${count} foto${count > 1 ? 's' : ''} descargada${count > 1 ? 's' : ''}`);
    }

    /* ── EXPORT PDF ────────────────────────────────────────────────── */
    async function doExportPDF(storeId) {
      const { jsPDF } = window.jspdf;
      const targetStores = storeId
        ? state.stores.filter(s => s.id === storeId)
        : state.stores;

      if (!targetStores.length) { toast('No hay tiendas para exportar', 'err'); return; }
      toast('Generando PDF...', 'info');

      const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
      const PW = 210, PH = 297, M = 14;
      const BLUE = [79, 70, 229], PURPLE = [124, 58, 237], LIGHT = [238, 242, 255];
      const date = new Date().toLocaleDateString('es-ES');
      let firstPage = true;

      for (const store of targetStores) {
        if (!firstPage) doc.addPage();
        firstPage = false;

        // ── Store header bar ─────────────────────────────────────────
        doc.setFillColor(...BLUE);
        doc.roundedRect(M, 12, PW - M * 2, 22, 3, 3, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(14);
        doc.text(store.tienda, M + 5, 22);
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(9);
        doc.text(`${store.cliente}  ·  ${store.pais || ''}  ·  ${date}`, M + 5, 29);

        let y = 42;

        const boxes = state.ambientes[store.id] || [];
        const storePhotos = state.photos[store.id] || {};

        for (const box of boxes) {
          const mats = (state.materials[store.id] || {})[box.id] || [];
          const rawPhotos = storePhotos[box.id];
          const photos = Array.isArray(rawPhotos) ? rawPhotos : (rawPhotos ? [rawPhotos] : []);

          // Estimate height needed
          const photoH = photos.length > 0 ? 52 : 0;
          const tableH = mats.length > 0 ? Math.min(mats.length * 7 + 14, 80) : 10;
          const blockH = 10 + photoH + tableH + 8;
          if (y + blockH > PH - 16) { doc.addPage(); y = 16; }

          // Ambient heading
          doc.setFillColor(...LIGHT);
          doc.roundedRect(M, y, PW - M * 2, 9, 2, 2, 'F');
          doc.setTextColor(...BLUE);
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(10);
          doc.text(box.name, M + 4, y + 6.2);
          doc.setTextColor(100, 100, 100);
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(8);
          doc.text(`${mats.length} material${mats.length !== 1 ? 'es' : ''}`, PW - M - 4, y + 6.2, { align: 'right' });
          y += 11;

          // Photos strip (up to 4 side by side)
          if (photos.length > 0) {
            const maxPhotos = Math.min(photos.length, 4);
            const imgW = (PW - M * 2 - (maxPhotos - 1) * 3) / maxPhotos;
            const imgH = 46;
            for (let pi = 0; pi < maxPhotos; pi++) {
              try {
                const src = getPhotoSrc(photos[pi]);
                const fmt = src.startsWith('data:image/png') ? 'PNG' : 'JPEG';
                const x = M + pi * (imgW + 3);
                doc.addImage(src, fmt, x, y, imgW, imgH, '', 'MEDIUM');
                // rounded border effect
                doc.setDrawColor(200, 200, 200);
                doc.setLineWidth(0.3);
                doc.rect(x, y, imgW, imgH);
              } catch (e) { /* skip bad image */ }
            }
            y += imgH + 4;
          }

          // Materials table
          if (mats.length > 0) {
            doc.autoTable({
              startY: y,
              margin: { left: M, right: M },
              head: [['#', 'Código SAP', 'Ubicación', 'Estado']],
              body: mats.map((m, i) => [
                i + 1,
                m.sapCode || '',
                m.location || '—',
                m.status || 'ACTIVO'
              ]),
              styles: { fontSize: 8, cellPadding: 2.5, textColor: [30, 30, 30] },
              headStyles: { fillColor: PURPLE, textColor: [255, 255, 255], fontStyle: 'bold', fontSize: 8 },
              alternateRowStyles: { fillColor: [248, 247, 255] },
              columnStyles: { 0: { cellWidth: 8 }, 1: { cellWidth: 36 }, 2: { cellWidth: 38 }, 3: { cellWidth: 24 } },
              tableLineColor: [220, 220, 230],
              tableLineWidth: 0.2,
            });
            y = doc.lastAutoTable.finalY + 6;
          } else {
            doc.setTextColor(150, 150, 150);
            doc.setFont('helvetica', 'italic');
            doc.setFontSize(8);
            doc.text('Sin materiales registrados', M + 4, y + 4);
            y += 10;
          }
          y += 2;
        }

        // Footer
        const pageCount = doc.getNumberOfPages();
        for (let p = 1; p <= pageCount; p++) {
          doc.setPage(p);
          doc.setDrawColor(200, 200, 210);
          doc.setLineWidth(0.3);
          doc.line(M, PH - 10, PW - M, PH - 10);
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(7);
          doc.setTextColor(150, 150, 150);
          doc.text('Porcelanosa · Auditoría de Exposiciones', M, PH - 6);
          doc.text(`${p} / ${pageCount}`, PW - M, PH - 6, { align: 'right' });
        }
      }

      const safeName = targetStores.length === 1
        ? targetStores[0].tienda.replace(/[/\\?%*:|"<>]/g, '_')
        : 'Global';
      doc.save(`Auditoria_Porcelanosa_${safeName}_${new Date().toISOString().split('T')[0]}.pdf`);
      toast('PDF generado con éxito');
    }

    /* ── IMPORT CSV ───────────────────────────────────────────────── */
    function importCSV() {
      const input = document.createElement('input');
      input.type = 'file'; input.accept = '.csv';
      input.onchange = e => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          const text = ev.target.result;
          const lines = text.split('\n').map(l => l.trim()).filter(l => l);
          if (lines.length < 2) { toast('CSV vacío', 'err'); return; }
          // Parse: BOX_NAME;SAP_CODE;DATE;LOC;LOC
          // Select which store to import into
          showStoreSelector(storeId => {
            let count = 0;
            const boxMap = {};
            for (let i = 1; i < lines.length; i++) {
              const cols = lines[i].split(';');
              if (cols.length < 4 || !cols[0] || !cols[1]) continue;
              const boxName = cols[0].trim();
              const sapCode = cols[1].trim();
              const date = cols[2]?.trim() || new Date().toLocaleDateString('es-ES');
              const loc = cols[3]?.trim() || '';
              if (!boxMap[boxName]) {
                if (!state.ambientes[storeId]) state.ambientes[storeId] = [];
                let existing = state.ambientes[storeId].find(b => b.name === boxName);
                if (!existing) {
                  existing = { id: 'bx_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4), name: boxName };
                  state.ambientes[storeId].push(existing);
                }
                boxMap[boxName] = existing.id;
              }
              addMaterial(storeId, boxMap[boxName], sapCode, loc, '', 'ACTIVO');
              count++;
            }
            saveState(); toast(`${count} materiales importados`);
            go('home');
          });
        };
        reader.readAsText(file);
      };
      input.click();
    }

    function showStoreSelector(callback) {
      const html = state.stores.map(s =>
        `<div class="card" style="margin-bottom:6px" onclick="document.querySelector('.overlay').remove();(${callback.toString()})('${s.id}')">
      <div class="avatar">${s.cliente[0]}</div>
      <div style="flex:1"><div class="card-title">${s.tienda}</div><div class="card-sub">${s.cliente}</div></div>
      <span class="chevron">${ICO.chevR}</span>
    </div>`
      ).join('');

      const overlay = document.createElement('div');
      overlay.className = 'overlay';
      overlay.innerHTML = `<div class="sheet" style="max-height:70vh;overflow-y:auto">
    <div class="sheet-handle"></div>
    <h3 class="sheet-title">Selecciona tienda destino</h3>
    ${html}
  </div>`;
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove() });
      document.body.appendChild(overlay);
    }

    /* ── MODALS ────────────────────────────────────────────────────── */
    function showModal(title, fields, onSave) {
      const overlay = document.createElement('div');
      overlay.className = 'overlay';
      const fieldsHtml = fields.map((f, i) => `
    <div style="margin-bottom:10px">
      <label class="label">${f.label}</label>
      <input class="input" id="modal-f${i}" placeholder="${f.ph}" ${i === 0 ? 'autofocus' : ''}>
    </div>`).join('');

      overlay.innerHTML = `<div class="sheet">
    <div class="sheet-handle"></div>
    <h3 class="sheet-title">${title}</h3>
    ${fieldsHtml}
    <button class="btn-primary" id="modal-save">Guardar</button>
  </div>`;

      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove() });
      document.body.appendChild(overlay);

      $('modal-save').onclick = () => {
        const vals = fields.map((_, i) => $('modal-f' + i).value.trim());
        if (!vals[0]) { toast('Rellena el campo obligatorio', 'err'); return; }
        overlay.remove();
        onSave(vals);
      };
    }

    function showConfirm(title, name, onConfirm) {
      const overlay = document.createElement('div');
      overlay.className = 'overlay';
      overlay.innerHTML = `<div class="sheet">
    <div class="sheet-handle"></div>
    <h3 class="sheet-title">${title}</h3>
    <p style="color:var(--text2);font-size:13px;margin-bottom:20px">¿Eliminar <strong style="color:var(--text)">${name}</strong>? No se puede deshacer.</p>
    <div style="display:flex;gap:8px">
      <button class="btn-secondary" onclick="this.closest('.overlay').remove()">Cancelar</button>
      <button class="btn-danger" id="confirm-del">Eliminar</button>
    </div>
  </div>`;
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove() });
      document.body.appendChild(overlay);
      $('confirm-del').onclick = () => { overlay.remove(); onConfirm(); };
    }

    /* ── RESET ────────────────────────────────────────────────────── */
    function resetAll() {
      showConfirm('Restaurar datos', 'todos los datos actuales', async () => {
        state.stores = MASTER_STORES.map((s, i) => ({ id: 'st_' + i, ...s }));
        state.ambientes = {}; state.materials = {}; state.logs = [];
        await saveState(); toast('Datos restaurados'); go('home');
      });
    }

    /* ══════════════════════════════════════════════════════════════════════
       INIT
       ══════════════════════════════════════════════════════════════════════ */
    (async function init() {
      await loadState();
      render();
    })();
  </script>
</body>
